<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080a0d;--surface:#0d1117;--surface2:#111720;--border:#1c2333;--border2:#243049;
  --amber:#e8a020;--amber2:#fbbf24;--blue:#3b82f6;--red:#ef4444;--red2:#f87171;
  --green:#22c55e;--yellow:#eab308;--muted:#4b5563;--dim:#6b7280;--text:#e5e7eb;--text2:#cbd5e1;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{padding:14px 12px 32px;max-width:560px;margin:0 auto}
a{color:var(--amber);text-decoration:none}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.hdr-l{flex:1;min-width:0}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:0.01em;line-height:1.25}
.hdr-sub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:0.04em;text-transform:uppercase}
.threat-pill{display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.08em;padding:6px 10px;border-radius:4px;text-transform:uppercase;white-space:nowrap}
.threat-CRITICAL{background:rgba(239,68,68,0.18);color:var(--red2);border:1px solid rgba(239,68,68,0.45)}
.threat-HIGH{background:rgba(232,160,32,0.18);color:var(--amber);border:1px solid rgba(232,160,32,0.45)}
.threat-ELEVATED{background:rgba(234,179,8,0.18);color:var(--yellow);border:1px solid rgba(234,179,8,0.45)}
.threat-MODERATE{background:rgba(59,130,246,0.18);color:var(--blue);border:1px solid rgba(59,130,246,0.45)}
.threat-LOW{background:rgba(34,197,94,0.18);color:var(--green);border:1px solid rgba(34,197,94,0.45)}
.day-pill{display:block;font-family:var(--mono);font-size:9px;color:var(--dim);text-align:right;margin-top:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:12px}
.card-critical{border-left:3px solid var(--red)}
.card-high{border-left:3px solid var(--amber)}
.card-title{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.headline{font-size:13.5px;font-weight:600;line-height:1.45;color:var(--text)}
.summary-text{font-size:12.5px;color:var(--text2);line-height:1.6;margin-top:8px}
.summary-text.collapsed{display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.toggle{display:inline-block;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--amber);font-weight:600;letter-spacing:0.04em;cursor:pointer;border:none;background:transparent;padding:4px 0}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px}
.kpi-label{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.kpi-val{font-size:18px;font-weight:700;color:var(--text);font-feature-settings:"tnum";line-height:1.15}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
.kpi-sub.up{color:var(--red2)}
.kpi-sub.dn{color:var(--green)}
.dev-list{margin:0;padding:0;list-style:none}
.dev-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text);line-height:1.5}
.dev-item:last-child{border-bottom:none}
.dev-tag{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--amber);letter-spacing:0.06em;text-transform:uppercase;margin-right:6px}
.scen-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.scen-row:last-child{border-bottom:none}
.scen-name{flex:1;font-size:12px;color:var(--text)}
.scen-pct{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--amber);min-width:42px;text-align:right}
.scen-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.scen-bar-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber2))}
.spark-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.spark-card{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:10px 10px 8px;position:relative}
.spark-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px}
.spark-label{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;line-height:1.2}
.spark-val{font-size:13px;font-weight:700;color:var(--text);font-feature-settings:"tnum";line-height:1}
.spark-svg{width:100%;height:38px;display:block}
.spark-foot{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:4px}
.spark-foot .delta.up{color:var(--red2)}
.spark-foot .delta.dn{color:var(--green)}
.spark-foot .delta.flat{color:var(--dim)}
.exco-bottom{font-size:13px;font-weight:600;color:var(--amber2);line-height:1.5;padding:8px 10px;background:rgba(232,160,32,0.06);border-left:3px solid var(--amber);border-radius:3px}
.eem-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.eem-row:last-child{border-bottom:none}
.eem-pill{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.06em;padding:3px 7px;border-radius:3px;text-transform:uppercase;min-width:62px;text-align:center;line-height:1.2}
.eem-pill.ACTIVE{background:rgba(239,68,68,0.18);color:var(--red2);border:1px solid rgba(239,68,68,0.4)}
.eem-pill.LIFTED{background:rgba(34,197,94,0.18);color:var(--green);border:1px solid rgba(34,197,94,0.4)}
.eem-pill.PARTIAL{background:rgba(232,160,32,0.18);color:var(--amber);border:1px solid rgba(232,160,32,0.4)}
.eem-body{flex:1;min-width:0}
.eem-label{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3}
.eem-meta{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:3px;line-height:1.45}
.eem-source{font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-top:3px}
.eem-source a{color:var(--amber);text-decoration:underline}
.eem-gas{display:flex;align-items:baseline;justify-content:space-between;padding:8px 10px;background:rgba(239,68,68,0.06);border-left:3px solid var(--red);border-radius:3px;margin-bottom:8px}
.eem-gas-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
.eem-gas-val{font-size:14px;font-weight:700;color:var(--red2);font-family:var(--mono)}
.eem-gas-mult{font-family:var(--mono);font-size:11px;color:var(--red2);font-weight:700;margin-left:6px}
.eem-bottom{font-size:12px;color:var(--text);line-height:1.55;margin-top:10px;padding:8px 10px;background:rgba(0,0,0,0.2);border-radius:3px;font-style:italic}
.eem-empty{font-size:11px;color:var(--dim);font-style:italic}
.exco-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-top:8px}
.footer{text-align:center;padding:16px 0 8px;color:var(--dim);font-family:var(--mono);font-size:10px;letter-spacing:0.04em}
.footer .desk{display:inline-block;padding:10px 16px;border:1px solid var(--border2);border-radius:5px;color:var(--amber);font-weight:600;text-transform:uppercase;margin-bottom:8px}
.footer .desk:active{background:rgba(232,160,32,0.08)}
.loading{text-align:center;padding:40px 0;color:var(--dim);font-family:var(--mono);font-size:11px}
.error{padding:16px;border:1px solid var(--red);border-radius:5px;color:var(--red2);font-size:12px}
@media(max-width:380px){
  body{padding:12px 10px 28px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:6px}
  .kpi-val{font-size:16px}
  .spark-grid{grid-template-columns:1fr;gap:8px}
  .spark-svg{height:50px}
}
</style>

<script>
(function(){
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function fmtNum(n,dp){if(n==null||isNaN(n))return '—';dp=dp==null?2:dp;return Number(n).toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp})}
  function pct(n){if(n==null||isNaN(n))return '—';var s=n>=0?'+':'';return s+Number(n).toFixed(1)+'%'}
  function ts(s){if(!s)return '';try{var d=new Date(s);return d.toISOString().replace('T',' ').slice(0,16)+' UTC'}catch(e){return s}}

  function spark(values, opts){
    opts = opts || {};
    var W = 100, H = 38, padX = 2, padY = 4;
    var arr = (values||[]).filter(function(v){return v!=null && !isNaN(v)});
    if (arr.length < 2) return '<svg class="spark-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true"><text x="50" y="22" text-anchor="middle" font-size="9" fill="#4b5563" font-family="monospace">no data</text></svg>';
    var min = opts.min!=null ? opts.min : Math.min.apply(null, arr);
    var max = opts.max!=null ? opts.max : Math.max.apply(null, arr);
    if (max === min) max = min + 1;
    var n = values.length;
    function x(i){return padX + (i/(n-1))*(W-2*padX)}
    function y(v){if(v==null||isNaN(v))return null;return H-padY - ((v-min)/(max-min))*(H-2*padY)}
    var pts = [];
    for (var i=0;i<n;i++){var yy=y(values[i]);if(yy!=null)pts.push(x(i).toFixed(1)+','+yy.toFixed(1))}
    var color = opts.color || '#e8a020';
    var areaPath = 'M' + pts[0] + ' L' + pts.join(' ') + ' L' + x(n-1).toFixed(1) + ',' + (H-padY) + ' L' + x(0).toFixed(1) + ',' + (H-padY) + ' Z';
    var linePath = 'M' + pts.join(' L');
    var lastIdx = n-1;
    var lastY = y(values[lastIdx]);
    var warStartIdx = opts.warStartIdx;
    var warMarker = '';
    if (warStartIdx != null && warStartIdx >= 0 && warStartIdx < n){
      var wx = x(warStartIdx).toFixed(1);
      warMarker = '<line x1="'+wx+'" y1="'+padY+'" x2="'+wx+'" y2="'+(H-padY)+'" stroke="#ef4444" stroke-width="0.6" stroke-dasharray="1.5,1.5" opacity="0.6"/>';
    }
    var endDot = (lastY!=null) ? '<circle cx="'+x(lastIdx).toFixed(1)+'" cy="'+lastY.toFixed(1)+'" r="1.6" fill="'+color+'"/>' : '';
    return '<svg class="spark-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true">'
      + '<defs><linearGradient id="sg-'+(opts.id||'x')+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.28"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'
      + '<path d="'+areaPath+'" fill="url(#sg-'+(opts.id||'x')+')"/>'
      + warMarker
      + '<path d="'+linePath+'" fill="none" stroke="'+color+'" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>'
      + endDot
      + '</svg>';
  }

  function delta(values){
    var arr = (values||[]).filter(function(v){return v!=null && !isNaN(v)});
    if (arr.length < 2) return {pct:null,dir:'flat'};
    var first = arr[0], last = arr[arr.length-1];
    if (first === 0) return {pct:null,dir:'flat'};
    var p = ((last-first)/Math.abs(first))*100;
    var dir = Math.abs(p) < 0.5 ? 'flat' : (p>0 ? 'up' : 'dn');
    return {pct:p,dir:dir};
  }

  function render(){
    var app = document.getElementById('app');
    var D = window.GULF_RISK_DATA;
    if (!D){
      app.className = '';
      app.innerHTML = '<div class="error">Data not loaded. Pull-to-refresh or open the desktop dashboard.</div>';
      return;
    }
    app.className = '';
    var m = D._meta || {};
    var b = D.brief || {};
    var mx = D.metrics || {};
    var cs = D.chart_series || {};
    var sc = D.scenarios || [];
    var eb = D.exco_briefing || {};
    var pr = D.predictions || {};
    var hhour = mx.hhour_probability_14d || (b.hhour_probability_14d) || (D.war && D.war.hhour_probability_14d) || null;
    var tl = (b.threat_level || 'HIGH').toUpperCase();

    var html = '';

    html += '<div class="hdr">'
      + '<div class="hdr-l">'
        + '<div class="hdr-title">Gulf &amp; Egypt Risk Monitor</div>'
        + '<div class="hdr-sub">EXCO Summary · Day '+esc(m.day||'—')+'</div>'
      + '</div>'
      + '<div>'
        + '<div class="threat-pill threat-'+esc(tl)+'">'+esc(tl)+'</div>'
        + '<div class="day-pill">'+esc(ts(m.updated))+'</div>'
      + '</div>'
      + '</div>';

    var hdl = b.headline || '';
    var sm = b.summary || '';
    html += '<div class="card card-critical">'
      + '<div class="card-title">Today’s headline</div>'
      + '<div class="headline">'+esc(hdl)+'</div>'
      + (sm ? '<div class="summary-text collapsed" id="sum-text">'+esc(sm)+'</div><button class="toggle" id="sum-toggle">Read more</button>' : '')
      + '</div>';

    var kpis = [];
    if (mx.brent_usd != null) kpis.push({l:'Brent (USD/bbl)', v:'$'+fmtNum(mx.brent_usd,2), s:'Goldman LT $90 · pre-war ~$70'});
    if (mx.egp_usd != null)   kpis.push({l:'USD/EGP', v:fmtNum(mx.egp_usd,2), s:'Panic threshold '+(mx.egp_panic_threshold||55)});
    if (mx.hormuz_ships_24h != null) kpis.push({l:'Hormuz 24h', v:String(mx.hormuz_ships_24h)+' ships', s:'Pre-war 125–140/day'});
    if (mx.us_gas_average != null)   kpis.push({l:'US gas (AAA)', v:'$'+fmtNum(mx.us_gas_average,3)+'/gal', s:'Pump-feed lag intact'});
    kpis.push({l:'Threat level', v:tl, s:b.summary ? '' : ''});
    if (hhour) kpis.push({l:'H-hour 14d', v:String(hhour), s:'Stalemate base case'});

    html += '<div class="card"><div class="card-title">Key indicators</div><div class="kpi-grid">';
    kpis.forEach(function(k){
      html += '<div class="kpi"><div class="kpi-label">'+esc(k.l)+'</div><div class="kpi-val">'+esc(k.v)+'</div>'
        + (k.s ? '<div class="kpi-sub">'+esc(k.s)+'</div>' : '')
        + '</div>';
    });
    html += '</div></div>';

    var warStartIdx = cs.war_start_index != null ? cs.war_start_index : null;
    var graphs = [
      {key:'brent',  label:'Brent (USD/bbl)', color:'#ef4444', dp:2, suffix:'', current:mx.brent_usd},
      {key:'egp',    label:'USD/EGP',         color:'#fbbf24', dp:2, suffix:'', current:mx.egp_usd},
      {key:'hormuz', label:'Hormuz transits/day', color:'#3b82f6', dp:0, suffix:'', current:mx.hormuz_ships_24h},
      {key:'suez',   label:'Suez transits/day',   color:'#22c55e', dp:0, suffix:'', current:null}
    ];
    var sparkHtml = '';
    graphs.forEach(function(g, i){
      var arr = cs[g.key] || [];
      var minK = cs[g.key+'_min'], maxK = cs[g.key+'_max'];
      if (g.key === 'hormuz') maxK = cs.hormuz_max;
      if (g.key === 'bab_el_mandeb') { minK = cs.bem_min; maxK = cs.bem_max; }
      var arrFiltered = arr.filter(function(v){return v!=null && !isNaN(v)});
      var last = arrFiltered.length ? arrFiltered[arrFiltered.length-1] : null;
      var displayVal = (g.current != null) ? g.current : last;
      var d = delta(arr);
      sparkHtml += '<div class="spark-card">'
        + '<div class="spark-head">'
          + '<div class="spark-label">'+esc(g.label)+'</div>'
          + '<div class="spark-val">'+(displayVal!=null?(g.key==='brent'?'$':'')+fmtNum(displayVal,g.dp):'—')+'</div>'
        + '</div>'
        + spark(arr,{id:'mob-'+g.key, color:g.color, min:minK, max:maxK, warStartIdx:warStartIdx})
        + '<div class="spark-foot">'
          + '<span>since '+esc((cs.labels && cs.labels[0]) ? cs.labels[0] : '')+'</span>'
          + '<span class="delta '+d.dir+'">'+(d.pct==null?'—':pct(d.pct))+'</span>'
        + '</div>'
        + '</div>';
    });
    html += '<div class="card card-high">'
      + '<div class="card-title">EXCO metric trends · since 28 Jan</div>'
      + '<div class="spark-grid">'+sparkHtml+'</div>'
      + (cs.source_note ? '<div class="kpi-sub" style="margin-top:8px">'+esc(cs.source_note.slice(0,180))+(cs.source_note.length>180?'…':'')+'</div>' : '')
      + '</div>';

    var devs = b.key_developments || [];
    if (devs.length){
      html += '<div class="card"><div class="card-title">Top changes today</div><ul class="dev-list">';
      devs.slice(0,4).forEach(function(d){
        if (typeof d === 'string'){
          html += '<li class="dev-item">'+esc(d)+'</li>';
        } else {
          var tag = d.tag || d.label || '';
          var text = d.text || d.summary || d.body || d.headline || '';
          html += '<li class="dev-item">'+(tag?'<span class="dev-tag">'+esc(tag)+'</span>':'')+esc(text)+'</li>';
        }
      });
      html += '</ul></div>';
    }

    if (sc && sc.length){
      html += '<div class="card"><div class="card-title">Scenarios · 14d</div>';
      sc.slice(0,5).forEach(function(s){
        var name = s.name || s.scenario || s.label || '';
        var p = s.probability != null ? s.probability : (s.weight != null ? s.weight : null);
        var pStr = (typeof p === 'number') ? Math.round(p*(p<=1?100:1)) : (p||'').toString().replace(/[^0-9]/g,'');
        var pNum = parseInt(pStr||'0',10);
        html += '<div><div class="scen-row"><div class="scen-name">'+esc(name)+'</div><div class="scen-pct">'+(pNum?pNum+'%':esc(p||'—'))+'</div></div>'
             + '<div class="scen-bar"><div class="scen-bar-fill" style="width:'+Math.min(100,pNum)+'%"></div></div></div>';
      });
      html += '</div>';
    }

    var eem = D.egypt_emergency_measures;
    if (eem && eem.measures && eem.measures.length){
      var eemHtml = '';
      if (eem.monthly_gas_import_bill){
        var gb = eem.monthly_gas_import_bill;
        eemHtml += '<div class="eem-gas">'
          + '<div><div class="eem-gas-label">Monthly gas import bill</div><div class="eem-gas-val">$'+esc(gb.current_usd_m)+'M<span class="eem-gas-mult">'+esc(gb.multiplier)+'x pre-war</span></div></div>'
          + '<div style="text-align:right" class="eem-source">'+esc(gb.source||'')+'</div>'
        + '</div>';
      }
      eem.measures.forEach(function(m){
        var st = (m.status || 'ACTIVE').toUpperCase();
        eemHtml += '<div class="eem-row">'
          + '<div class="eem-pill '+esc(st)+'">'+esc(st)+'</div>'
          + '<div class="eem-body">'
            + '<div class="eem-label">'+esc(m.label||'')+'</div>'
            + '<div class="eem-meta">'+esc(m.since||'')+(m.until?' &rarr; '+esc(m.until):'')+(m.decree?' · '+esc(m.decree):'')+'</div>'
            + (m.source ? '<div class="eem-source">'+(m.url ? '<a href="'+esc(m.url)+'" target="_blank" rel="noopener">'+esc(m.source)+'</a>' : esc(m.source))+'</div>' : '')
          + '</div>'
        + '</div>';
      });
      if (eem.bottom_line){
        eemHtml += '<div class="eem-bottom">'+esc(eem.bottom_line)+'</div>';
      }
      html += '<div class="card card-high">'
        + '<div class="card-title">Egypt emergency measures · trackable status</div>'
        + eemHtml
      + '</div>';
    }

    if (eb && (eb.headline || eb.one_paragraph_summary || eb.bottom_line)){
      html += '<div class="card card-critical"><div class="card-title">EXCO bottom-line</div>'
        + (eb.bottom_line ? '<div class="exco-bottom">'+esc(eb.bottom_line)+'</div>' : '')
        + (eb.headline ? '<div class="headline" style="margin-top:'+(eb.bottom_line?'8px':'0')+'">'+esc(eb.headline)+'</div>' : '')
        + (eb.one_paragraph_summary ? '<div class="exco-summary">'+esc(eb.one_paragraph_summary)+'</div>' : '')
        + '</div>';
    }

    html += '<div class="footer">'
      + '<a class="desk" href="index.html?desktop=1">Open full desktop view</a>'
      + '<div>Source: paulcoomber.github.io/middle-east-tracker</div>'
      + (m.updated ? '<div style="margin-top:4px">Updated '+esc(ts(m.updated))+'</div>' : '')
      + '</div>';

    app.innerHTML = html;

    var t = document.getElementById('sum-toggle');
    if (t) t.addEventListener('click', function(){
      var st = document.getElementById('sum-text');
      if (!st) return;
      if (st.classList.contains('collapsed')){st.classList.remove('collapsed');t.textContent='Read less'}
      else {st.classList.add('collapsed');t.textContent='Read more'}
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
  else render();
})();
</script>
</body>
</html>
