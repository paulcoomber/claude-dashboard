<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080a0d;--surface:#0d1117;--surface2:#111720;--border:#1c2333;--border2:#243049;
  --amber:#e8a020;--amber2:#fbbf24;--blue:#3b82f6;--red:#ef4444;--red2:#f87171;
  --green:#22c55e;--yellow:#eab308;--muted:#4b5563;--dim:#6b7280;--text:#e5e7eb;--text2:#cbd5e1;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{padding:14px 12px 32px;max-width:560px;margin:0 auto}
a{color:var(--amber);text-decoration:none}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}
.hdr-l{flex:1;min-width:0}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:0.01em;line-height:1.25}
.hdr-sub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:3px;letter-spacing:0.04em;text-transform:uppercase}
.threat-pill{display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.08em;padding:6px 10px;border-radius:4px;text-transform:uppercase;white-space:nowrap}
.threat-CRITICAL{background:rgba(239,68,68,0.18);color:var(--red2);border:1px solid rgba(239,68,68,0.45)}
.threat-HIGH{background:rgba(232,160,32,0.18);color:var(--amber);border:1px solid rgba(232,160,32,0.45)}
.threat-ELEVATED{background:rgba(234,179,8,0.18);color:var(--yellow);border:1px solid rgba(234,179,8,0.45)}
.threat-MODERATE{background:rgba(59,130,246,0.18);color:var(--blue);border:1px solid rgba(59,130,246,0.45)}
.threat-LOW{background:rgba(34,197,94,0.18);color:var(--green);border:1px solid rgba(34,197,94,0.45)}
.day-pill{display:block;font-family:var(--mono);font-size:9px;color:var(--dim);text-align:right;margin-top:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:12px}
.card-critical{border-left:3px solid var(--red)}
.card-high{border-left:3px solid var(--amber)}
.card-title{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.headline{font-size:13.5px;font-weight:600;line-height:1.45;color:var(--text)}
.summary-text{font-size:12.5px;color:var(--text2);line-height:1.6;margin-top:8px}
.summary-text.collapsed{display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.toggle{display:inline-block;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--amber);font-weight:600;letter-spacing:0.04em;cursor:pointer;border:none;background:transparent;padding:4px 0}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px}
.kpi-label{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.kpi-val{font-size:18px;font-weight:700;color:var(--text);font-feature-settings:"tnum";line-height:1.15}
.kpi-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
.kpi-sub.up{color:var(--red2)}
.kpi-sub.dn{color:var(--green)}
.dev-list{margin:0;padding:0;list-style:none}
.dev-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--text);line-height:1.5}
.dev-item:last-child{border-bottom:none}
.dev-tag{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--amber);letter-spacing:0.06em;text-transform:uppercase;margin-right:6px}
.scen-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.scen-row:last-child{border-bottom:none}
.scen-name{flex:1;font-size:12px;color:var(--text)}
.scen-pct{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--amber);min-width:42px;text-align:right}
.scen-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.scen-bar-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber2))}
.spark-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.spark-card{background:var(--surface2);border:1px solid var(--border2);border-radius:5px;padding:10px 10px 8px;position:relative}
.spark-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:6px}
.spark-label{font-family:var(--mono);font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;line-height:1.2}
.spark-val{font-size:13px;font-weight:700;color:var(--text);font-feature-settings:"tnum";line-height:1}
.spark-svg{width:100%;height:38px;display:block}
.spark-foot{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:4px}
.spark-foot .delta.up{color:var(--red2)}
.spark-foot .delta.dn{color:var(--green)}
.spark-foot .delta.flat{color:var(--dim)}
.exco-bottom{font-size:13px;font-weight:600;color:var(--amber2);line-height:1.5;padding:8px 10px;background:rgba(232,160,32,0.06);border-left:3px solid var(--amber);border-radius:3px}
.eem-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.eem-row:last-child{border-bottom:none}
.eem-pill{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.06em;padding:3px 7px;border-radius:3px;text-transform:uppercase;min-width:62px;text-align:center;line-height:1.2}
.eem-pill.ACTIVE{background:rgba(239,68,68,0.18);color:var(--red2);border:1px solid rgba(239,68,68,0.4)}
.eem-pill.LIFTED{background:rgba(34,197,94,0.18);color:var(--green);border:1px solid rgba(34,197,94,0.4)}
.eem-pill.PARTIAL{background:rgba(232,160,32,0.18);color:var(--amber);border:1px solid rgba(232,160,32,0.4)}
.eem-body{flex:1;min-width:0}
.eem-label{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3}
.eem-meta{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:3px;line-height:1.45}
.eem-source{font-family:var(--mono);font-size:9.5px;color:var(--dim);margin-top:3px}
.eem-source a{color:var(--amber);text-decoration:underline}
.eem-gas{display:flex;align-items:baseline;justify-content:space-between;padding:8px 10px;background:rgba(239,68,68,0.06);border-left:3px solid var(--red);border-radius:3px;margin-bottom:8px}
.eem-gas-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
.eem-gas-val{font-size:14px;font-weight:700;color:var(--red2);font-family:var(--mono)}
.eem-gas-mult{font-family:var(--mono);font-size:11px;color:var(--red2);font-weight:700;margin-left:6px}
.eem-bottom{font-size:12px;color:var(--text);line-height:1.55;margin-top:10px;padding:8px 10px;background:rgba(0,0,0,0.2);border-radius:3px;font-style:italic}
.eem-empty{font-size:11px;color:var(--dim);font-style:italic}
.exco-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-top:8px}
.footer{text-align:center;padding:16px 0 8px;color:var(--dim);font-family:var(--mono);font-size:10px;letter-spacing:0.04em}
.footer .desk{display:inline-block;padding:10px 16px;border:1px solid var(--border2);border-radius:5px;color:var(--amber);font-weight:600;text-transform:uppercase;margin-bottom:8px}
.footer .desk:active{background:rgba(232,160,32,0.08)}
.loading{text-align:center;padding:40px 0;color:var(--dim);font-family:var(--mono);font-size:11px}
.error{padding:16px;border:1px solid var(--red);border-radius:5px;color:var(--red2);font-size:12px}
@media(max-width:380px){
  body{padding:12px 10px 28px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:6px}
  .kpi-val{font-size:16px}
  .spark-grid{grid-template-columns:1fr;gap:8px}
  .spark-svg{height:50px}
}
</style>

  hormuz: {
    status: "PROJECT FREEDOM PAUSED + TRUMP \"GREAT PROGRESS\" + BLOCKADE NOMINALLY INTACT — Wed 6 May 06:07 UTC MORNING: Trump paused Project Freedom less than 48h after launch citing Pakistan request + \"Great Progress toward a Complete and Final Agreement\" with Iran (Truth Social, multi-source 5-6 May). Blockade nominally maintained. Most material de-escalation signal since 8 Apr ceasefire. May 4 print 11 crossings (5 in / 6 out per HormuzTracker). Hapag-Lloyd refusal architecture (Watchlist #52) HOLDS pending CENTCOM SOP for non-US-flagged. UAE 2nd-day attack 5 May (Al Jazeera) preserves downside on the kinetic interface. Pred #46 (IRGC mine-laying within 14 days) revised DOWN ~42-52% to ~30-40%. Pakistan-mediated channel back at full pace. HISTORICAL TUE EVENING: Project Freedom OPERATIONAL + SECOND KINETIC ENGAGEMENT IN 24H (Iran overnight attack on US forces + commercial vessels); legitimacy gap on non-US-flagged (Hapag-Lloyd refuses); permission-based trickle on Iran side — Tue 5 May 18:07 UTC EVENING: Hegseth (Defense Secretary) PUBLICLY ASSERTS the ceasefire is not over (CNBC 5 May) after Iran attacked US forces and the commercial vessels they were protecting in Hormuz overnight Mon-Tue. Pred #46 (IRGC mine-laying within 14 days) revised UP ~38-48% to ~42-52% on second-engagement evidence. HISTORICAL TUE MORNING: Hapag-Lloyd confirms transit through Hormuz remains IMPOSSIBLE for its vessels despite CENTCOM Project Freedom launch (Bloomberg/Al-Monitor). MarineTraffic via Al-Monitor: Hormuz May 4 print only 1 sanctioned handy-sized LPG carrier + a few cargo ships + cable-laying vessel passed into Gulf of Oman; no tankers lining up. CENTCOM Day-1 Project Freedom cited a success by top US Middle East commander; US helicopters sank 6 Iranian small boats per CENTCOM (vs Trump 7 per CBS); Iranian cruise missiles targeting USN destroyers + merchant ships shot down. HISTORICAL MON EVENING: 37 ships redirected by US blockade. CENTCOM confirmed 2 US-flagged merchants successfully transited under USN guided-missile destroyer escort (CNN/TWZ/Times of Israel/Stars and Stripes). Force package: USN destroyers + 100+ land/sea-based aircraft + multi-domain unmanned platforms + 15,000 service members. Iran fired warning shots at USN destroyers (Stars and Stripes); Trump reports 7 Iranian small boats shot down (CBS); IRGC denied transits as \'baseless\' (Euronews) and falsely claimed USN ship struck (CENTCOM denied). Iran parliament: US Hormuz interference = ceasefire violation. Mohsen Rezaee (Khamenei military adviser): Tehran prepared to create \'graveyard\' of US vessels. PERMITTED-NATIONS REGIME continues on Iranian side: 5 nations (China, Russia, India, Iraq, Pakistan + Malaysia/Thailand) per Wikipedia. Polymarket prices \'No\' at ~79-80% on normalisation by 31 May. ~5% pre-war flow holds before USN escorts begin. NEW MON EVENING: Iran drone+missile attack on UAE Fujairah oil terminal (Al Jazeera/CNBC/NPR) — first Iranian attack on UAE since 8 Apr ceasefire; IRGC Navy expanded control zone to include Fujairah, Khorfakkan, Umm Al Quwain. US REJECTED Hormuz-without-nuclear variant (JPost 1 May) holds. Pentagon 6-month mine-clearing timeline holds. Three US CSGs on station.",

    iran_response: "Vowing retaliation for MV Touska. Joint military command: \'will soon respond and retaliate against this armed piracy\'. Wed 6 May 06:07 UTC MORNING: TRUMP PAUSES PROJECT FREEDOM citing \"Great Progress toward a Complete and Final Agreement\" — Iran-side response architecture pivots from kinetic preservation to potential reciprocity test. Whether Tehran reciprocates with kinetic stand-down (MV Touska release, IRGC pause on Hormuz, UAE attack cessation), or treats pause as US weakness and hardens. UAE 2nd-day attack 5 May (Al Jazeera) is the most direct counterindication — Iran-UAE kinetic interface continues underneath US-Iran de-escalation framing. Pred #46 (IRGC mine-laying within 14 days) revised DOWN ~42-52% to ~30-40% on Trump pause but Iran-UAE kinetic interface preserves downside. HISTORICAL TUE EVENING: Tue 5 May 18:07 UTC EVENING: SECOND KINETIC ENGAGEMENT IN 24H — Iran attacked US forces and the commercial vessels they were protecting in Hormuz overnight Mon-Tue (CNBC/Hegseth context 5 May). Hegseth response: the-ceasefire-is-not-over. Pred #46 (IRGC mine-laying within 14 days) revised UP ~42-52%. HISTORICAL TUE MORNING: kinetic exchange HOLDS post-Mon-evening Fujairah strike + Project Freedom; no fresh IRGC kinetic action overnight. CENTCOM separately denied IRGC false-claim USN warship struck — IRGC information operation now visible. Brent eased ~1% Tue Asia open (~$112.50) after the denial. Trump DECLINES to say whether US-Iran ceasefire still in effect (CNN live update). HISTORICAL MON EVENING: KINETIC RE-ESCALATION MATERIALISED — Iran launched drone+missile attack on UAE Fujairah oil terminal (Al Jazeera/CNBC/NPR), first Iranian attack on UAE since 8 Apr ceasefire; UAE intercepted 3 cruise missiles, 4th splashed; 3 Indian nationals wounded; IRGC Navy expanded control zone to include Fujairah, Khorfakkan, Umm Al Quwain coast. US Project Freedom OPERATIONAL — Iran fired warning shots at USN destroyers (Stars and Stripes); Trump reports 7 Iranian small boats shot down (CBS); IRGC denied any commercial transits (\'baseless and outright lies\') and falsely claimed USN ship struck (CENTCOM denied). Mohsen Rezaee (top military adviser to Mojtaba Khamenei): Tehran prepared to create \'graveyard\' of American military vessels if fighting resumes. Khatam al-Anbiya HQ commander: any foreign military force, especially US Army, will be attacked if approaching Hormuz. Iran parliament National Security Commission head: any US interference in Hormuz = ceasefire violation. Tehran moving DOWN on flexibility (30-day war-end demand vs 2-month US ceasefire variant; ambassador-to-Pakistan condition; Rezaee \'graveyard\' threat). 14-point proposal text remains public (JPost/Claims Journal) but Trump now reviewing new military options to relaunch war (PBS NewsHour 4 May). IRGC permission-based transit regime continues on Iranian side (5 permitted nations: China, Russia, India, Iraq, Pakistan + Malaysia/Thailand). Pakistan mediator role collapsed Sat (technical-relay role partially reactivated for US response Mon AM); Beijing summit (May 14-15) and Russia/Oman remain operative architecture for any path-down.",
    mv_touska: "Iranian cargo ship seized 19 Apr by USS Spruance. Iran demanding immediate release. Still held. Wed 6 May 06:07 UTC MORNING: Trump pause of Project Freedom + \"Great Progress\" framing meaningfully raises probability of an MV Touska release as a goodwill signal in the next 14 days — revised UP ~5-12% to ~12-20%. The ship-release pathway is now most plausibly tied to the Pakistan-mediated phase-1 deal architecture (war-end + Hormuz first; nuclear later). UAE 2nd-day attack 5 May (Al Jazeera) preserves downside on the kinetic interface. HISTORICAL TUE EVENING: Tue 5 May 18:07 UTC EVENING: Hegseth the-ceasefire-is-not-over framing preserves a public off-ramp Iran could use for an MV Touska release as goodwill gesture; Iran 14-point phased framing (Reuters/CNBC: end war + Hormuz first) increases the relative weight of ship-release as part of an early-phase deal. Probability of unilateral Iran release within 14 days: ~5-12% (low). HISTORICAL TUE MORNING: Iran-side ceasefire compliance has visibly broken (Fujairah attack); US Project Freedom is operational; Trump now reviewing new military options to relaunch war (PBS). MV Touska release likely tied to a stripped-down package-deal acceptance + de-escalation framework that does not yet exist on either side. With Pakistan mediator role collapsed, ship release pathway runs through Beijing/Russia/Oman or through a unilateral Iranian release as goodwill gesture (low probability post-Fujairah).",

  watchlist: {
    items: [
      { id: 1, label: "Iran's FORMAL proposal — TRUMP REJECTED Wed 29 Apr", deadline: "Resolved Wed 29 Apr", status: "RESOLVED — REJECTED (Axios)", notes: "Wed 29 Apr PM: TRUMP FORMALLY REJECTED Iran's Mon Pakistan-mediated proposal in Axios phone interview — 'they're choking like a stuffed pig'. Rubio softened verbally — 'better than what we thought' — but anchored on nuclear precondition. Pakistan mediators expect a revised Iranian counter-proposal in coming days." },
      { id: 2, label: "MV Touska — Iranian retaliation", deadline: "Hours-days", status: "CRITICAL", notes: "Iran joint military command 'will soon respond and retaliate'. Ship still held. New 'shoot to destroy' ROE on mine-laying boats means any kinetic Iranian response now risks immediate kinetic US response." },
      { id: 4, label: "Ground operations — Kharg/Qeshm/uranium", deadline: "Open-ended", status: "POSTURED — UPGRADED", notes: "82nd Airborne HQ forward deployed. USS Bush CSG ARRIVED in CENTCOM (third US carrier). Wed 29 Apr probability next 14 days: ~25-30% (UP from 22-26% Tue) — Trump's formal Axios rejection CONFIRMED, Brent $116+, Lebanon arc compounding (3 rescue workers killed Wed). IAEA Grossi confirmed ~200kg HEU likely still at Isfahan since June 2025." },
      { id: 5, label: "Nuclear counterproliferation raid — Isfahan fortification", deadline: "If ground ops commence", status: "HIGH", notes: "Trump explicit: 'We want the nuclear dust.' 200kg confirmed at Isfahan — too deep to destroy. Wed 29 Apr Grossi to AP confirms HEU likely there since June 2025." },
      { id: 6, label: "Lebanon — escalation compounding (rescue workers killed Wed)", deadline: "~14 May", status: "ESCALATING — Compounding", notes: "Wed 29 Apr: Israeli strikes killed 8 in southern Lebanon including 3 RESCUE WORKERS (Euronews); Israel threatened to 'burn' all of Lebanon. Fourth-rung escalation after Tue Bekaa Valley + Tue 16-town displacement order. Trump-extended truce to ~14 May effectively unraveling." },
      { id: 7, label: "EGP — CBE re-assertion holds through Mon + Tue", deadline: "Days-weeks", status: "MONITORED", notes: "Tue 5 May 06:07 UTC MORNING: EGP at 53.530 (Wise/xe.com Tue AM) — CBE re-assertion HOLDS into Tue trading after Mon AM 53.5200 / Mon PM 53.551. Cushion to 55 panic threshold $1.47. The managed-band-wider scenario (Pred #42 25-30% bucket) continues to operate intraday across kinetic re-escalation pressure. HISTORICAL MON EVENING: EGP at 53.551 (Wise/xe.com Mon PM) — CBE re-assertion holding through Mon trading; cushion to 55 panic threshold $1.45. The morning's managed-band-wider scenario (Pred #42 25-30% bucket) holds intraday despite kinetic re-escalation pressure on regional FX risk premia (Brent +6.10%, Iran-UAE attack, Project Freedom kinetic exchange). The press-release-grade reserves figure ($52.83B end-March) remains detached from operative cash position. Bond spread 745bps. Watch April CBE CPI + reserves prints (early-May window)." },
      { id: 8, label: "Beijing summit", deadline: "May 14-15", status: "Increasingly relevant", notes: "With Pakistan-mediated track in trouble, Beijing summit becomes more important as fallback architecture." },
      { id: 10, label: "Mine-laying incident under new ROE", deadline: "Real-time", status: "HIGH", notes: "Trump (23 Apr) and Hegseth (24 Apr) authorised Navy to 'shoot to destroy'. First kinetic encounter under this ROE could rapidly collapse the open-ended ceasefire." },
      { id: 12, label: "Second-wave inflation — goods channel not yet priced", deadline: "H2 2026", status: "MEDIUM-TERM WATCH", notes: "Wave 1 (oil price spike) priced at $116. Wave 2 (imported inflation through goods channel) has not arrived yet. Estimated lag: 6-10 weeks." },
      { id: 13, label: "Egypt — invest / relocate technical resources?", deadline: "H1 2027 review", status: "ANALYTICAL WATCH", notes: "Q4 2026 target was too optimistic. DO NOT COMMIT, watch-only until H1 2027. Four trigger conditions: ceasefire, reserves >$32B, EGP stable 60 days, IMF tranche disbursed." },
      { id: 14, label: "Pentagon 6-month Hormuz mine-clearing timeline", deadline: "Structural", status: "STRATEGIC", notes: "Pentagon told Congress fully clearing Iran's Hormuz mines could take SIX MONTHS. Even a diplomatic deal will not produce immediate Hormuz/Suez normalisation." },
      { id: 19, label: "Iran's REVISED counter-proposal — DELIVERED Fri 1 May to Pakistan mediators", deadline: "Days", status: "ACTIVE — diplomatic filament reopened", notes: "Fri 1 May EVENING: Iran sent updated peace proposal to mediators in Pakistan (CNBC/Axios/Reuters). Reportedly again seeks Hormuz reopening with nuclear postponed. US showed 'little immediate enthusiasm' (NBC) given continuing nuclear precondition gap. Khamenei nuclear/missile guard reaffirmation from yesterday holds. First concession-direction move since Trump rejection Wed; channel alive but precondition gap unresolved. Watch: formal US response in 24-72h." },
      { id: 20, label: "IAEA Grossi confirms HEU at Isfahan since June 2025", deadline: "Resolved Wed 29 Apr", status: "RESOLVED — Confirmed", notes: "Wed 29 Apr (AP): IAEA Director General Grossi told the AP that ~200kg of Iran's 60% HEU 'likely remains' at Isfahan since June 2025 12-day war. Stockpile potentially enables 'as many as 10 nuclear bombs' if weaponised." },
      { id: 21, label: "Fed rate decision — Powell's last as chair (29 Apr)", deadline: "Resolved Wed 29 Apr", status: "RESOLVED — Held with rare 8-4 dissent", notes: "Wed 29 Apr: Fed held target range 3.50-3.75% on 8-4 dissent — most since October 1992. Powell will step aside as chair mid-May but stay on Fed Board of Governors." },
      { id: 22, label: "UAE OPEC exit effective 1 May — settlement watch", deadline: "1 May 2026", status: "STRUCTURAL — imminent", notes: "Wed 29 Apr: UAE exit from OPEC and OPEC+ takes effect 1 May 2026 (TOMORROW). Saudi has 25% idle capacity to offset (CNBC). Watch: Saudi production response, UAE quota deviation post-1 May." },
      { id: 23, label: "Egypt — emergency $3B IMF loan request formalisation", deadline: "Weeks", status: "CRITICAL — INCOMING", notes: "Thu 30 Apr EVENING: Cairo reportedly considering an emergency IMF loan up to $3B on top of the existing EFF + RSF programme — first reporting of an emergency-tranche request since the war began. World Bank shows $38.65B in external debt + interest due Apr 2026 → end 2026. Trigger condition coupled with EGP break to 53.73." },
      { id: 24, label: "US military briefing to Trump on potential Iran action", deadline: "Days", status: "CRITICAL — H-hour signal — POST-DEADLINE-HALT", notes: "Thu 30 Apr: reports US military will brief Trump on potential action against Iran drove Brent intraday to wartime high $126.41 (then back to $114.22). Fri 1 May: White House halt of 60-day War Powers Act deadline removes the moderating Congressional constraint on any operational order that may follow the briefing. The briefing-to-decision interval IS the H-hour window." },
      { id: 25, label: "War Powers Act 60-day deadline ARRIVED TODAY; White House argues halted", deadline: "Resolved Fri 1 May (deadline arrived; halt operative)", status: "RESOLVED — DEADLINE-HALT OPERATIVE", notes: "Fri 1 May EVENING: 60-day War Powers Act deadline formally arrived today (Al Jazeera). White House continues to argue (CNBC, Al Jazeera) the ceasefire halts the clock. Operative reality matches morning announcement. No Senate AUMF counter-vote signalled today; Murkowski separate-authorization track and Schumer floor-signals remain the watch items." },
      { id: 26, label: "UAE post-OPEC production policy first day signals (1 May)", deadline: "Days", status: "STRUCTURAL — Day 1", notes: "UAE exit from OPEC and OPEC+ takes effect TODAY. Saudi 25% idle capacity backstops; UAE quota deviation watch begins. Watch: UAE production reporting and Saudi response within first week." },
      { id: 27, label: "April CBE Egypt CPI release", deadline: "Early May", status: "PENDING", notes: "March urban CPI 15.2% (vs 13.4% Feb). April print due in coming days; consensus pencilling further uptick on March fuel-hike pull-through and EGP weakness. Decision-grade for the Egypt-specific stress narrative." },
      { id: 28, label: "Iran's UPDATED proposal — TRUMP REJECTED 'unacceptable'; Iran-side review continues via Pakistan", deadline: "Days", status: "ACTIVE — path-down door closes; Iran-side review only", notes: "Mon 4 May 06:07 UTC MORNING: Trump told Israel's Kan broadcaster (Al Jazeera 3 May) he reviewed Iran's 14-point plan and deemed it 'unacceptable'; warned strikes 'may resume' if Iran 'misbehaves'. Significant hardening from Sun-evening's bidirectional review framing — closes the path-down door. Iran-side review continues: Iran Foreign Ministry spokesman Esmaeil Baghaei (Pakistan Today / IRNA) said US response received via Pakistan and under review — Pakistan retains TECHNICAL-RELAY role despite Sat's Islamabad meeting cancellation. Iran demands war end within 30 days not the 2-month US ceasefire variant (NPR / Washington Times) — Tehran moving DOWN on timeline. Senior Iranian military officer said renewed US-Iran fighting 'likely' (NPR 2 May). Watch: Iran's formal response to Trump's rejection — counter-amendment, hardened precondition, or walk; Beijing/Russia/Oman channel pickup; whether kinetic Iranian retaliation materialises." },
      { id: 29, label: "AAA US national gasoline REFRESHED $4.392 — pump-lag thesis erodes", deadline: "Resolved Fri 1 May", status: "RESOLVED — PUMP-FEED PULL-THROUGH ARRIVED", notes: "Fri 1 May EVENING: AAA national average refreshed to $4.392/gal — material increase from morning $4.031 print. Pump-feed pull-through from prior week's $118+ Brent surge has now arrived. Sat 2 May: holds at $4.392 — first weekly print where pull-through fully visible. Watch: domestic political pressure that wasn't present at $4.03 — Trump's domestic approval narrative reset." },
      { id: 30, label: "Iran-Pakistan mediator legitimacy crisis — MATERIALISED", deadline: "Days", status: "RESOLVED — Pakistan-mediation collapsed in operative terms", notes: "Sat 2 May 18:08 UTC EVENING: Iran FORMALLY CANCELLED the scheduled Islamabad nuclear-deal meeting (Zoomnews) citing 'lack of trust in Pakistan's mediation'. Sharper than the morning's mediator-legitimacy framing — channel-architecture risk has now MATERIALISED, not just risen. Field Marshal Munir's reported informal assurances on blockade lifting (which Trump did not deliver) cited as proximate cause. Beijing summit (May 14-15) and Russia/Oman fallback rails are now load-bearing operative architecture, not contingent." },
      { id: 31, label: "Senate War Powers fracture — TWO GOP defections (Collins + Paul)", deadline: "Days-weeks", status: "CRITICAL — Republican fracture broader than morning report", notes: "Sat 2 May 18:08 UTC EVENING: CORRECTION — TWO GOP defections, not one. Rand Paul (R-Kentucky) ALSO crossed Friday alongside Susan Collins (Hill / NOTUS / Time) — vote was 47-50. Morning brief had Collins as the only defector; Paul's name was missed in initial reads. Senate war-powers fracture line broader than initially scoped. Lee on watch as next candidate. If one more GOP defection on next vote, deadline-halt argument loses operational cover." },
      { id: 32, label: "Trump 'not satisfied' with Iran proposal + blockade reaffirmation", deadline: "Days", status: "CRITICAL — path-down narrows further with Pakistan-channel collapse", notes: "Sat 2 May 18:08 UTC EVENING: Trump told reporters Friday/early Saturday he is 'not satisfied' with Iran's new peace proposal and reaffirmed (CBS Live) the naval blockade will continue. Combined with Iran's CANCELLATION of the Islamabad meeting today (Zoomnews) and the broader GOP fracture (Collins + Paul; Murkowski AUMF commitment), the diplomatic surface has moved further against the path-down case across the day. Watch: any formal Trump rejection language equivalent to the Wed 29 Apr 'choking like a stuffed pig' framing; whether Beijing/Russia/Oman pick up channel role." },
      { id: 33, label: "Iran formally CANCELLED Islamabad nuclear-deal meeting", deadline: "Resolved Sat 2 May", status: "RESOLVED — MEETING CANCELLED", notes: "Sat 2 May 18:08 UTC EVENING: Iran cancelled the scheduled meeting at the last minute (Zoomnews), citing lack of trust in Pakistan's mediation. The morning's mediator-legitimacy crisis has materialised as Pakistan-channel collapse. Tehran cited Field Marshal Munir's reportedly-informal blockade-lifting assurances (which Trump did not deliver) as proximate cause. Beijing (May 14-15) and Russia/Oman now operative architecture." },
      { id: 34, label: "Murkowski AUMF concrete commitment", deadline: "Days-weeks", status: "CRITICAL — concrete mechanism announced", notes: "Sat 2 May 18:08 UTC EVENING: Sen. Lisa Murkowski (R-AK) announced after Friday's vote that she WILL INTRODUCE an Authorization for Use of Military Force for the conflict if the 60-day mark passes without a 'credible plan' from Trump (Hill). This converts her position from the 'separate-authorization track' framing to a concrete mechanism. Watch: when she introduces, whether Paul + Collins + Lee align (4-5 GOP block would change the operative state). If she introduces and gains traction, the deadline-halt argument loses cover." },
      { id: 35, label: "Bidirectional review state — RESOLVED: Trump rejected, Iran-side review continues", deadline: "Resolved Mon 4 May", status: "RESOLVED — Trump formal rejection (Kan / Al Jazeera)", notes: "Mon 4 May 06:07 UTC MORNING: Trump told Kan broadcaster (Al Jazeera 3 May) he reviewed Iran's 14-point plan and deemed it 'unacceptable'; warned strikes 'may resume'. Sun-evening's bidirectional review state collapses to one-sided review (Iran-side continuing via Pakistan technical-relay). The forecast Sun-evening branch 'reverts to Wed 29 Apr-grade rejection' has materialised — 'unacceptable' is operatively close to 'choking like a stuffed pig'. Path-down filament narrows materially. Pred #38 (Trump engages substantively on 14-point text) probability revised DOWN." },
      { id: 36, label: "India-linked Sarv Shakti rare Hormuz transit via IRGC permission", deadline: "Resolved Sun 3 May", status: "RESOLVED — illustrative of permission-based architecture", notes: "Sun 3 May 06:07 UTC MORNING: Marshall Islands-flagged Sarv Shakti, ~45,000 tons LPG, crossed via IRGC permission system past Larak and Qeshm Islands (gCaptain). India desperate to alleviate cooking-fuel crisis. IRGC has published a map of 'alternative routes for transit' through Iranian territorial waters — physically routes traffic past Iranian-controlled checkpoints for inspection. Illustrative of the permission-based trickle architecture rather than a normalisation signal. Watch: which other nations get permission slots, whether China/India/Russia get preferential access vs GCC traffic." },
      { id: 37, label: "IAEA-Russia-US HEU extraction discussion — multi-source CORROBORATED", deadline: "Days-weeks", status: "ACTIVE — multi-source confirmed; agreement not imminent", notes: "Sun 3 May 18:07 UTC EVENING: Multi-source confirmation now (JPost, Yahoo News, CryptoBriefing, The Hill, Foreign Policy 29 Apr / 3 May, Bulletin of Atomic Scientists Mar 2026). IAEA discussing extraction of Iran's 440.9kg of 60% HEU with Russia and US. The Hill quotes Grossi: Russia 'remains open' to taking HEU. Foreign Policy reports Trump publicly told Putin to focus on Ukraine instead — agreement not imminent. Single-source caveat from Sun morning lifted. Watch: official IAEA statement; Russian Foreign Ministry confirmation/denial; Iranian acceptance signalling (Khamenei nuclear/missile guard reaffirmation argues against). If formalised, multilateral extraction would be a path to defusing the Isfahan stockpile without the kinetic counterproliferation raid case." },
      { id: 38, label: "Iran's 14-point proposal text surfaces — wide ask", deadline: "Days", status: "ACTIVE — text public", notes: "Sun 3 May 06:07 UTC MORNING: Iranian state media via JPost / Claims Journal 1 May: 14-point proposal includes US troop withdrawal from areas surrounding Iran, blockade lifting, frozen-asset release, compensation, sanctions relief, ending war on all fronts incl Lebanon, plus a new control mechanism for the Strait of Hormuz. Wide ask. The 14-point ambit + US rejection of Hormuz-without-nuclear variant means the proposal as written is unlikely to be accepted; a counter-amendment or stripped-down version is the most plausible path to substantive engagement." },
      { id: 39, label: "Iran-side review continues via Pakistan TECHNICAL-RELAY (post-Trump rejection)", deadline: "Days", status: "ACTIVE — Iran-side review only after Trump rejection", notes: "Mon 4 May 06:07 UTC MORNING: Iran Foreign Ministry spokesman Esmaeil Baghaei (Pakistan Today / IRNA) said the US response to Iran's 14-point proposal was received via Pakistan and is under review. Notable: Pakistan retains TECHNICAL-RELAY role despite Sat's Islamabad meeting cancellation; mediator-level role collapsed but technical-relay role partially reactivated for the US-side reply. Iran demands war end within 30 days not the 2-month US ceasefire (NPR / Washington Times) — Tehran moving DOWN on timeline. Iran's ambassador to Pakistan (IRNA) condition ('change in Washington's behavior') hardened. Watch: whether Iran's review yields formal counter-amendment to Trump's rejection or walks; whether technical-relay role expands back toward mediation; senior military officer 'likely renewed fighting' (NPR 2 May) compounds kinetic-risk premium." },
      { id: 40, label: "EGP Mon open — RESOLVED: CBE re-asserted 53.5200 (managed-band-wider scenario won)", deadline: "Resolved Mon 4 May", status: "RESOLVED — CBE re-asserted; cushion widens back to $1.48", notes: "Mon 4 May 06:07 UTC MORNING: EGP Mon open 53.5200 (Wise) — CBE RE-ASSERTED across the weekend drift; pound back to last week's managed level despite Sun-evening 53.640 print. Cushion to 55 panic threshold widens back to $1.48. Pred #42 RESOLVES in the managed-band-wider 25-30% bucket — pound holds 53.40-53.70 with CBE re-assertion absorbing weekend drift. The no-defence read does NOT confirm; cover-up thesis remains intact at structural level (operative cash position detached from public top-line) but CBE has visibly intervened on public top-line. Watch April CBE CPI + reserves prints (window open early May)." },
      { id: 41, label: "Iraqi supertanker transited Hormuz 2 May — permitted-nations regime", deadline: "Resolved Sat 2 May", status: "RESOLVED — illustrative of permission-based architecture", notes: "Sun 3 May 18:07 UTC EVENING: Iraqi supertanker successfully transited Strait of Hormuz with 1M barrels crude (Hatha Alyoum English 2 May). Iraq is one of 5 permitted nations per Wikipedia 2026 Strait of Hormuz crisis page (alongside China, Russia, India, Pakistan + Malaysia/Thailand). Same IRGC permission architecture as Sun-morning's Sarv Shakti — illustrative of permission-based trickle, not normalisation. Watch: which other permitted-nation flag transits land; whether China/India get preferential routing." },
      { id: 43, label: "Trump REJECTED Iran 14-point proposal as 'unacceptable'; warns strikes may resume", deadline: "Days", status: "CRITICAL — path-down door closes", notes: "Mon 4 May 06:07 UTC MORNING: Trump told Israel's Kan broadcaster (Al Jazeera 3 May) he reviewed Iran's 14-point plan and deemed it 'unacceptable'. Warned strikes 'may resume' if Iran 'misbehaves'. Significant hardening from Sun-evening's 'reviewing'/bidirectional review framing — closes path-down door from Sun-evening bidirectional review state. Watch: whether 'unacceptable' becomes a formal Wed 29 Apr-grade rejection ('choking like a stuffed pig') or whether Trump engages on a stripped-down counter-text via Beijing/Russia/Oman; whether kinetic Iranian retaliation materialises in coming days (senior military officer 'likely' framing NPR 2 May)." },
      { id: 44, label: "Senior Iranian military officer says renewed US-Iran fighting 'likely'", deadline: "Days", status: "ACTIVE — kinetic risk premium", notes: "Mon 4 May 06:07 UTC MORNING: NPR 2 May — senior Iranian military officer said renewed fighting between US and Iran was 'likely', hours after Trump said he was 'not satisfied' with Iranian proposal. Combined with Trump's subsequent 'unacceptable' framing on 3 May (Kan/Al Jazeera), kinetic risk premium ticks up. Watch: any IRGC mine-laying incident under shoot-to-destroy ROE; MV Touska retaliation; Hezbollah escalation in Lebanon arc (~14 May truce expiry approaching)." },
      { id: 45, label: "Iran demands war end within 30 days not 2-month US ceasefire variant", deadline: "Days-weeks", status: "ACTIVE — precondition gap sharpens", notes: "Mon 4 May 06:07 UTC MORNING: NPR / Washington Times 3 May — Iran's 14-point response includes demand to resolve all issues and end war within 30 DAYS, instead of observing the 2-month ceasefire as the US had proposed. Tehran moving DOWN on timeline rather than UP on flexibility. Combined with Iran ambassador-to-Pakistan condition ('change in Washington's behavior', IRNA) and Trump's rejection (Kan/Al Jazeera), precondition gap widens not narrows. Watch: whether Iran walks back to 2-month timeline as part of formal counter-amendment, or hardens further toward immediate cessation demand." },

      { id: 27, text: "First kinetic incident under new 'shoot to destroy' ROE", status: "PENDING — probability ticking up", deadline: "Days-weeks", notes: "Probability within 14 days: ~30-34%. Khamenei reaffirmation + extended blockade duration + White House deadline-halt (which lengthens blockade-duration horizon) raise IRGC unilateral risk further.", updated: "2026-05-01" },

      { id: 33, text: "EGP breaches 55 panic threshold", status: "PENDING — drift weakening to 53.640 Sun-evening", deadline: "Weeks", notes: "Sun 3 May 18:07 UTC EVENING: EGP DRIFT WEAKENING — Wise Sun-evening 53.640 vs today's opening 53.52 (+0.22% intraday); week range 52.5 on 27 Apr to 53.765 on 30 Apr; cushion to 55 panic threshold narrowed to $1.36. Probability within 60 days: ~42-47% (revised UP from 40-45% on weekend drift without visible CBE defence). Mon open is decision-grade — if CBE re-asserts toward 53.0-53.3, cover-up thesis weakens transiently; if pound continues toward 53.7+, no-defence read confirms and probability rises further.", updated: "2026-05-03" },
      { id: 34, text: "Iran formally withdraws Pakistan as channel host", status: "RESOLVED — CORRECT (Islamabad meeting cancelled Sat 2 May)", deadline: "Resolved Sat 2 May", notes: "Sat 2 May 18:08 UTC EVENING: Iran FORMALLY CANCELLED the scheduled Islamabad nuclear-deal meeting (Zoomnews), citing 'lack of trust in Pakistan\'s mediation'. Prediction made at morning run with ~20-25% probability over 30 days resolved CORRECT in <12 hours. Beijing (May 14-15) and Russia/Oman fallback rails now operative architecture.", updated: "2026-05-02" },
      { id: 35, text: "Second GOP defection on War Powers Resolution", status: "RESOLVED — CORRECT in same vote (Paul also crossed)", deadline: "Resolved Fri 30 Apr", notes: "Sat 2 May 18:08 UTC EVENING: CORRECTION — Rand Paul (R-KY) ALSO crossed on the SAME Friday vote alongside Collins (Hill / NOTUS / Time). The vote was 47-50 with TWO GOP defections, not the single defection the morning brief recorded. Prediction resolves CORRECT but in an embarrassing way (Paul was always going to vote with libertarians). Lee remains the candidate for any next-vote third defection.", updated: "2026-05-02" },
      { id: 36, text: "Murkowski introduces AUMF for the Iran conflict", status: "PENDING — concrete commitment as of Fri 30 Apr", deadline: "By 60-day mark or shortly after", notes: "Sat 2 May 18:08 UTC EVENING: Murkowski announced post-vote she WILL INTRODUCE an AUMF if the 60-day passes without a \'credible plan\' from Trump (Hill). 60-day arrived 1 May; \'credible plan\' is undefined and Trump-discretionary. Probability she introduces within 30 days: ~45-55%. If introduced, deadline-halt argument loses operational cover.", updated: "2026-05-02" },
      { id: 37, text: "First reported rolling blackout in Egypt", status: "PENDING — June peak-demand approaching", deadline: "Jun-Aug 2026", notes: "Sun 3 May 06:07 UTC MORNING: Egypt June peak-demand window opens in <8 weeks. Energy crisis structural (gas import bill 2.95x pre-war; Sunday WFH active; fuel-oil burn ACTIVE). If Hormuz remains closed (Polymarket ~80% No on May normalisation; Pakistan-channel collapse hits Hormuz reopening path; rare permission-based transits like Sarv Shakti are not normalisation), LNG cargo arbitrage tightens. Probability of first reported rolling blackout by end-July: ~50-60%.", updated: "2026-05-03" },
      { id: 38, text: "Trump engages substantively on Iran 14-point text (counter-amendment, talks reopen)", status: "PENDING — UPGRADED on Trump-pause + Great Progress framing", deadline: "7-14 days", notes: "Wed 6 May 06:07 UTC MORNING: Trump paused Project Freedom citing \"Great Progress toward a Complete and Final Agreement\" with Iran (Truth Social, multi-source 5-6 May). Probability revised UP ~15-22% to ~25-35% — \"Great Progress\" framing implies engagement on Iran 14-point phased text (war end + Hormuz first; nuclear later) underneath. US precondition on HEU removal nominally binding but Trump framing implies movement. Pakistan-mediated channel back at full pace; Beijing summit May 14-15 (~8 days out) decision-grade for whether de-escalation translates into a written framework. Watch: any published agreement text within 14 days. HISTORICAL MON: Mon 4 May 06:07 UTC MORNING: Trump told Israel's Kan broadcaster (Al Jazeera 3 May) he reviewed Iran's 14-point plan and deemed it 'unacceptable'; warned strikes 'may resume' if Iran 'misbehaves'. Probability of substantive engagement within 14 days revised DOWN from 28-38% to ~15-22% — Trump's rejection materially narrows the direct US-Iran path. Iran-side review via Pakistan technical-relay continues but Iran's 30-day war-end demand + ambassador-to-Pakistan condition harden Tehran-side preconditions. Multilateral pickup (Beijing summit May 14-15, Russia/Oman) becomes the residual filament. If Trump's next public statement formalises the rejection at Wed 29 Apr-grade harshness ('choking like a stuffed pig'), probability falls to single digits.", updated: "2026-05-04" },
      { id: 39, text: "IAEA-Russia-US HEU extraction agreement materialises (formal trilateral framework)", status: "PENDING — multi-source CORROBORATED", deadline: "30-60 days", notes: "Sun 3 May 18:07 UTC EVENING: Multi-source corroboration now (JPost, Yahoo, CryptoBriefing, The Hill, Foreign Policy, Bulletin of Atomic Scientists). The Hill quotes Grossi: Russia 'remains open' to taking HEU. Foreign Policy reports Trump publicly told Putin to focus on Ukraine instead. Probability of formal trilateral framework within 60 days: ~18-28% (revised UP from 15-25% on multi-source corroboration of underlying discussion). Iran's acceptance is the binding constraint — Tehran would have to accept verifiable removal of weaponisation-grade material under multilateral custody, which Khamenei's nuclear/missile guard reaffirmation argues against; Trump's deferral to Putin's Ukraine focus suggests US not yet pushing for imminent agreement either.", updated: "2026-05-03" },
      { id: 40, text: "Beijing summit (May 14-15) produces written framework that holds >7 days", status: "PENDING — bull-case trigger watch", deadline: "May 14-22", notes: "Sun 3 May 06:07 UTC MORNING: With Pakistan channel collapsed, Beijing summit becomes decision-grade. Probability of written framework holding >7 days: ~20-30%. Constraints: China explicitly NOT willing to be ceasefire guarantor (Diplomat/Brookings); US precondition (Hormuz reopening tied to nuclear concession) remains binding. If achieved, this is the bull-case trigger that would shift Egypt outlook materially.", updated: "2026-05-03" },
      { id: 41, text: "Iran's review of US reply yields formal counter-amendment within 14 days", status: "PENDING — Iran-side review continues via Pakistan technical-relay; preconditions hardening", deadline: "14 days", notes: "Mon 4 May 06:07 UTC MORNING: Iran Foreign Ministry spokesman Esmaeil Baghaei (Pakistan Today / IRNA): US response received via Pakistan and under review. Iran demands war end within 30 days not the 2-month US ceasefire variant (NPR / Washington Times) — Tehran moving DOWN on timeline rather than UP on flexibility, hardening preconditions. Probability of formal Iranian counter-amendment within 14 days revised DOWN from 30-40% to ~22-30% — Tehran-side hardening on timeline + Trump's rejection mean any Iranian counter-amendment will face a higher acceptance bar from Trump than Sun-evening framing implied. Alternative outcomes: hardened precondition (Iran refuses to amend; closer to materialising), formal walk (channel closes), absorption into Beijing-summit framework.", updated: "2026-05-04" },

      { id: 43, text: "Trump's 'strikes may resume' framing materialises as new operational order within 14 days", status: "PENDING — DOWNGRADED post-Trump-pause", deadline: "14 days", notes: "Wed 6 May 06:07 UTC MORNING: Trump paused Project Freedom less than 48h after launch citing \"Great Progress toward a Complete and Final Agreement\" with Iran (Truth Social, multi-source 5-6 May). Pause is the opposite of operational ramp. Probability of new operational order within 14 days revised DOWN ~22-30% to ~14-22%. UAE 2nd-day attack (Al Jazeera 5 May) preserves downside but the de-escalation framing dominates. H-hour DOWNGRADED ~30-35% to ~22-28%. Three US carriers remain on station; pause is not withdrawal. HISTORICAL MON EVENING: Mon 4 May 18:07 UTC EVENING: Trump now reviewing new military options to relaunch war (PBS NewsHour 4 May) following Iran drone+missile attack on UAE Fujairah and operational launch of Project Freedom (Iran fired warning shots at USN destroyers; Trump reports 7 Iranian small boats shot down). Probability of new operational order (any kinetic activity beyond current blockade-and-redirect posture) within 14 days: revised UP from 12-18% to ~22-30%. Mohsen Rezaee (Khamenei military adviser) \'graveyard\' threat + Fujairah strike + Project Freedom kinetic exchange + PBS framing all sit at the kinetic-decision interface. Constraints unchanged: GOP fracture (Collins + Paul; Murkowski concrete AUMF mechanism); 60-day deadline-halt argument under direct Senate challenge but operationally hollowing out post-Fujairah; AAA gas $4.457 cumulative pump-feed compounds. The H-hour for ground operations rises to ~30-35% (from 25-30%); strikes-may-resume now sits at the lower bar (cruise/strike-package).", updated: "2026-05-04" },

      { id: 45, text: "UAE issues retaliatory framing post-Fujairah within 7 days", status: "PARTIAL-RESOLVED — formal-statement bucket hit (95%); GCC + support pending", deadline: "7 days", notes: "Tue 5 May 06:07 UTC MORNING: UAE Foreign Ministry: attacks were an 'unacceptable transgression' / UAE 'reserves its full and legitimate right to respond'; held Iran fully responsible for 'treacherous attacks'. UAE Ministry of Education: nationwide remote learning Tue-Fri 5-8 May. UAE air defences engaged 12 ballistic + 3 cruise + 4 UAVs. Formal-statement bucket (95% probability) RESOLVES CORRECT. Pending: GCC consultation (~80%), request for additional US/Western support (~50-65%), UAE direct kinetic counter-response (~10-20%). HISTORICAL MON EVENING: Iran drone+missile attack on UAE Fujairah oil terminal — first Iranian attack on UAE since 8 Apr ceasefire (Al Jazeera/CNBC/NPR/Gulf News). Probability of formal UAE retaliatory framing within 7 days: ~70-85% (formal statement: ~95%; GCC consultation: ~80%; request for additional US/Western support: ~50-65%; UAE direct kinetic counter-response: ~10-20%). Watch: UAE Foreign Ministry statement, MBZ public framing, MBS reaction, EU/UK/France comment, Project Freedom extension to UAE-flagged carriers.", updated: "2026-05-04" },
      { id: 46, text: "IRGC mine-laying incident under shoot-to-destroy ROE within 14 days", status: "PENDING — DOWNGRADED post-Trump-pause", deadline: "14 days", notes: "Wed 6 May 06:07 UTC MORNING: Trump paused Project Freedom + \"Great Progress toward a Complete and Final Agreement\" framing (Truth Social 5-6 May). Pause removes immediate kinetic interface; probability revised DOWN ~42-52% to ~30-40%. UAE 2nd-day attack (Al Jazeera 5 May) preserves downside on Iran-UAE kinetic interface; Iran-side reciprocity test pending. HISTORICAL TUE EVENING: Tue 5 May 18:07 UTC EVENING: SECOND KINETIC ENGAGEMENT IN 24H — Iran attacked US forces and the commercial vessels they were protecting in Hormuz overnight Mon-Tue (CNBC/Hegseth context 5 May). Hegseth response: the-ceasefire-is-not-over. Probability revised UP ~38-48% to ~42-52% on second-engagement evidence under Project Freedom — the engagement-frequency rate is now high enough that an IRGC mine-laying or kinetic response under shoot-to-destroy ROE is materially more likely within 14 days. Pred #47 revised DOWN to ~18-25% on Hegseth statement is the offsetting counterweight on the formal-architecture side. HOLDING TUE MORNING: Tue-overnight kinetic exchange HOLDS without escalation — no fresh IRGC mine-laying or kinetic action. CENTCOM denied IRGC false-claim USN warship struck (Brent eased ~1% Tue Asia open on the denial). Probability HOLDS ~38-48% within 14 days; Mon evening UPGRADE rationale fully intact. HISTORICAL MON EVENING: With Iran-UAE Fujairah attack + Project Freedom kinetic exchange (warning shots at USN destroyers; 7 Iranian small boats destroyed per Trump/CBS), the threshold for an IRGC mine-laying incident materially lower. Mohsen Rezaee (Khamenei military adviser) threatens \'graveyard\' of US vessels; Khatam al-Anbiya HQ commander: any foreign military force, especially US Army, will be attacked if approaching Hormuz. Probability of first kinetic encounter under shoot-to-destroy ROE within 14 days: r       { id: 48, text: "Hegseth the-ceasefire-is-not-over framing holds without Trump contradiction within 14 days", status: "PENDING — UPGRADED on Trump corroboration", deadline: "14 days", notes: "Wed 6 May 06:07 UTC MORNING: Trump paused Project Freedom + \"Great Progress toward a Complete and Final Agreement\" framing (Truth Social 5-6 May) — Trump corroborated Hegseth's ceasefire-is-not-over framing rather than contradicting. Probability revised UP ~50-65% to ~65-78%. Hegseth doctrinal framing now solidifying into administration off-ramp logic. Pred #47 collapses correspondingly to ~8-15%. HISTORICAL TUE EVENING: Tue 5 May 18:07 UTC EVENING: New prediction. Hegseth (Defense Secretary) publicly asserted on CNBC (5 May) that the ceasefire is not over after Iran attacked US forces + commercial vessels in Hormuz overnight Mon-Tue. Probability of the framing holding without direct Trump contradiction within 14 days: ~50-65%. Constraints for: Trump Mon-Tue declines-to-confirm framing left room; Hegseth statement tracks administration off-ramp logic; Beijing summit (May 14-15) within window adds path-down weight. Constraints against: Trump PBS-NewsHour Mon reviewing-operational-options framing remains ambient; another kinetic engagement could force re-framing; Murkowski AUMF could pressure Trump to harden. Pairs as direct counterweight to Pred #47 (formal Trump declaration ceasefire null/non-operative within 14 days, ~18-25%).", updated: "2026-05-05" },

<script>
(function(){
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  function fmtNum(n,dp){if(n==null||isNaN(n))return '—';dp=dp==null?2:dp;return Number(n).toLocaleString('en-US',{minimumFractionDigits:dp,maximumFractionDigits:dp})}
  function pct(n){if(n==null||isNaN(n))return '—';var s=n>=0?'+':'';return s+Number(n).toFixed(1)+'%'}
  function ts(s){if(!s)return '';try{var d=new Date(s);return d.toISOString().replace('T',' ').slice(0,16)+' UTC'}catch(e){return s}}

  function spark(values, opts){
    opts = opts || {};
    var W = 100, H = 38, padX = 2, padY = 4;
    var arr = (values||[]).filter(function(v){return v!=null && !isNaN(v)});
    if (arr.length < 2) return '<svg class="spark-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true"><text x="50" y="22" text-anchor="middle" font-size="9" fill="#4b5563" font-family="monospace">no data</text></svg>';
    var min = opts.min!=null ? opts.min : Math.min.apply(null, arr);
    var max = opts.max!=null ? opts.max : Math.max.apply(null, arr);
    if (max === min) max = min + 1;
    var n = values.length;
    function x(i){return padX + (i/(n-1))*(W-2*padX)}
    function y(v){if(v==null||isNaN(v))return null;return H-padY - ((v-min)/(max-min))*(H-2*padY)}
    var pts = [];
    for (var i=0;i<n;i++){var yy=y(values[i]);if(yy!=null)pts.push(x(i).toFixed(1)+','+yy.toFixed(1))}
    var color = opts.color || '#e8a020';
    var areaPath = 'M' + pts[0] + ' L' + pts.join(' ') + ' L' + x(n-1).toFixed(1) + ',' + (H-padY) + ' L' + x(0).toFixed(1) + ',' + (H-padY) + ' Z';
    var linePath = 'M' + pts.join(' L');
    var lastIdx = n-1;
    var lastY = y(values[lastIdx]);
    var warStartIdx = opts.warStartIdx;
    var warMarker = '';
    if (warStartIdx != null && warStartIdx >= 0 && warStartIdx < n){
      var wx = x(warStartIdx).toFixed(1);
      warMarker = '<line x1="'+wx+'" y1="'+padY+'" x2="'+wx+'" y2="'+(H-padY)+'" stroke="#ef4444" stroke-width="0.6" stroke-dasharray="1.5,1.5" opacity="0.6"/>';
    }
    var endDot = (lastY!=null) ? '<circle cx="'+x(lastIdx).toFixed(1)+'" cy="'+lastY.toFixed(1)+'" r="1.6" fill="'+color+'"/>' : '';
    return '<svg class="spark-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" aria-hidden="true">'
      + '<defs><linearGradient id="sg-'+(opts.id||'x')+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.28"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'
      + '<path d="'+areaPath+'" fill="url(#sg-'+(opts.id||'x')+')"/>'
      + warMarker
      + '<path d="'+linePath+'" fill="none" stroke="'+color+'" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>'
      + endDot
      + '</svg>';
  }

  function delta(values){
    var arr = (values||[]).filter(function(v){return v!=null && !isNaN(v)});
    if (arr.length < 2) return {pct:null,dir:'flat'};
    var first = arr[0], last = arr[arr.length-1];
    if (first === 0) return {pct:null,dir:'flat'};
    var p = ((last-first)/Math.abs(first))*100;
    var dir = Math.abs(p) < 0.5 ? 'flat' : (p>0 ? 'up' : 'dn');
    return {pct:p,dir:dir};
  }

  function render(){
    var app = document.getElementById('app');

    var mx = D.metrics || {};
    var cs = D.chart_series || {};
    var sc = D.scenarios || [];
    var eb = D.exco_briefing || {};
    var pr = D.predictions || {};
    var hhour = mx.hhour_probability_14d || (b.hhour_probability_14d) || (D.war && D.war.hhour_probability_14d) || null;

      + '</div>'
      + '<div>'
        + '<div class="threat-pill threat-'+esc(tl)+'">'+esc(tl)+'</div>'
        + '<div class="day-pill">'+esc(ts(m.updated))+'</div>'
      + '</div>'
      + '</div>';

    var hdl = b.headline || '';
    var sm = b.summary || '';
    html += '<div class="card card-critical">'
      + '<div class="card-title">Today’s headline</div>'
      + '<div class="headline">'+esc(hdl)+'</div>'
      + (sm ? '<div class="summary-text collapsed" id="sum-text">'+esc(sm)+'</div><button class="toggle" id="sum-toggle">Read more</button>' : '')
      + '</div>';

    var kpis = [];
    if (mx.brent_usd != null) kpis.push({l:'Brent (USD/bbl)', v:'$'+fmtNum(mx.brent_usd,2), s:'Goldman LT $90 · pre-war ~$70'});
    if (mx.egp_usd != null)   kpis.push({l:'USD/EGP', v:fmtNum(mx.egp_usd,2), s:'Panic threshold '+(mx.egp_panic_threshold||55)});
    if (mx.hormuz_ships_24h != null) kpis.push({l:'Hormuz 24h', v:String(mx.hormuz_ships_24h)+' ships', s:'Pre-war 125–140/day'});
    if (mx.us_gas_average != null)   kpis.push({l:'US gas (AAA)', v:'$'+fmtNum(mx.us_gas_average,3)+'/gal', s:'Pump-feed lag intact'});

    html += '<div class="card"><div class="card-title">Key indicators</div><div class="kpi-grid">';
    kpis.forEach(function(k){
      html += '<div class="kpi"><div class="kpi-label">'+esc(k.l)+'</div><div class="kpi-val">'+esc(k.v)+'</div>'
        + (k.s ? '<div class="kpi-sub">'+esc(k.s)+'</div>' : '')
        + '</div>';
    });
    html += '</div></div>';

    var warStartIdx = cs.war_start_index != null ? cs.war_start_index : null;

      var last = arrFiltered.length ? arrFiltered[arrFiltered.length-1] : null;
      var displayVal = (g.current != null) ? g.current : last;
      var d = delta(arr);
      sparkHtml += '<div class="spark-card">'
        + '<div class="spark-head">'
          + '<div class="spark-label">'+esc(g.label)+'</div>'
          + '<div class="spark-val">'+(displayVal!=null?(g.key==='brent'?'$':'')+fmtNum(displayVal,g.dp):'—')+'</div>'
        + '</div>'
        + spark(arr,{id:'mob-'+g.key, color:g.color, min:minK, max:maxK, warStartIdx:warStartIdx})
        + '<div class="spark-foot">'
          + '<span>since '+esc((cs.labels && cs.labels[0]) ? cs.labels[0] : '')+'</span>'
          + '<span class="delta '+d.dir+'">'+(d.pct==null?'—':pct(d.pct))+'</span>'
        + '</div>'
        + '</div>';
    });
    html += '<div class="card card-high">'
      + '<div class="card-title">EXCO metric trends · since 28 Jan</div>'
      + '<div class="spark-grid">'+sparkHtml+'</div>'
      + (cs.source_note ? '<div class="kpi-sub" style="margin-top:8px">'+esc(cs.source_note.slice(0,180))+(cs.source_note.length>180?'…':'')+'</div>' : '')
      + '</div>';

    var devs = b.key_developments || [];
    if (devs.length){
      html += '<div class="card"><div class="card-title">Top changes today</div><ul class="dev-list">';
      devs.slice(0,4).forEach(function(d){
        if (typeof d === 'string'){
          html += '<li class="dev-item">'+esc(d)+'</li>';
        } else {
          var tag = d.tag || d.label || '';
          var text = d.text || d.summary || d.body || d.headline || '';
          html += '<li class="dev-item">'+(tag?'<span class="dev-tag">'+esc(tag)+'</span>':'')+esc(text)+'</li>';
        }
      });
      html += '</ul></div>';
    }

    if (sc && sc.length){
      html += '<div class="card"><div class="card-title">Scenarios · 14d</div>';
      sc.slice(0,5).forEach(function(s){
        var name = s.name || s.scenario || s.label || '';
        var p = s.probability != null ? s.probability : (s.weight != null ? s.weight : null);
        var pStr = (typeof p === 'number') ? Math.round(p*(p<=1?100:1)) : (p||'').toString().replace(/[^0-9]/g,'');
        var pNum = parseInt(pStr||'0',10);
        html += '<div><div class="scen-row"><div class="scen-name">'+esc(name)+'</div><div class="scen-pct">'+(pNum?pNum+'%':esc(p||'—'))+'</div></div>'
             + '<div class="scen-bar"><div class="scen-bar-fill" style="width:'+Math.min(100,pNum)+'%"></div></div></div>';
      });
      html += '</div>';
    }

    var eem = D.egypt_emergency_measures;
    if (eem && eem.measures && eem.measures.length){
      var eemHtml = '';
      if (eem.monthly_gas_import_bill){
        var gb = eem.monthly_gas_import_bill;
        eemHtml += '<div class="eem-gas">'
          + '<div><div class="eem-gas-label">Monthly gas import bill</div><div class="eem-gas-val">$'+esc(gb.current_usd_m)+'M<span class="eem-gas-mult">'+esc(gb.multiplier)+'x pre-war</span></div></div>'
          + '<div style="text-align:right" class="eem-source">'+esc(gb.source||'')+'</div>'
        + '</div>';
      }
      eem.measures.forEach(function(m){
        var st = (m.status || 'ACTIVE').toUpperCase();
        eemHtml += '<div class="eem-row">'
          + '<div class="eem-pill '+esc(st)+'">'+esc(st)+'</div>'
          + '<div class="eem-body">'
            + '<div class="eem-label">'+esc(m.label||'')+'</div>'
            + '<div class="eem-meta">'+esc(m.since||'')+(m.until?' &rarr; '+esc(m.until):'')+(m.decree?' · '+esc(m.decree):'')+'</div>'
            + (m.source ? '<div class="eem-source">'+(m.url ? '<a href="'+esc(m.url)+'" target="_blank" rel="noopener">'+esc(m.source)+'</a>' : esc(m.source))+'</div>' : '')
          + '</div>'
        + '</div>';
      });
      if (eem.bottom_line){
        eemHtml += '<div class="eem-bottom">'+esc(eem.bottom_line)+'</div>';
      }
      html += '<div class="card card-high">'
        + '<div class="card-title">Egypt emergency measures · trackable status</div>'
        + eemHtml
      + '</div>';
    }

    if (eb && (eb.headline || eb.one_paragraph_summary || eb.bottom_line)){
      html += '<div class="card card-critical"><div class="card-title">EXCO bottom-line</div>'
        + (eb.bottom_line ? '<div class="exco-bottom">'+esc(eb.bottom_line)+'</div>' : '')
        + (eb.headline ? '<div class="headline" style="margin-top:'+(eb.bottom_line?'8px':'0')+'">'+esc(eb.headline)+'</div>' : '')
        + (eb.one_paragraph_summary ? '<div class="exco-summary">'+esc(eb.one_paragraph_summary)+'</div>' : '')
        + '</div>';
    }

    html += '<div class="footer">'
      + '<a class="desk" href="index.html?desktop=1">Open full desktop view</a>'
      + '<div>Source: paulcoomber.github.io/middle-east-tracker</div>'
      + (m.updated ? '<div style="margin-top:4px">Updated '+esc(ts(m.updated))+'</div>' : '')
      + '</div>';

    app.innerHTML = html;

    var t = document.getElementById('sum-toggle');
    if (t) t.addEventListener('click', function(){
      var st = document.getElementById('sum-text');
      if (!st) return;
      if (st.classList.contains('collapsed')){st.classList.remove('collapsed');t.textContent='Read less'}
      else {st.classList.add('collapsed');t.textContent='Read more'}
    });
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', render);
  else render();
})();
</script>
</body>
</html>
